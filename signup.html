<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMSIC — SIGN UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #FAFAF7;
      --text:   #0E0E0E;
      --accent: #C4960E;
      --light:  #E6E6E0;
      --mid:    #7A7A72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--light);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--mid);
      margin-left: 1.8rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .card-sub {
      font-size: 0.82rem;
      color: var(--mid);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .benefits {
      list-style: none;
      margin-bottom: 2rem;
      border: 1px solid var(--light);
      border-radius: 4px;
      overflow: hidden;
    }
    .benefits li {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1.2rem;
      font-size: 0.83rem;
      border-bottom: 1px solid var(--light);
    }
    .benefits li:last-child { border-bottom: none; }
    .benefits li::before {
      content: '✦';
      color: var(--accent);
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .btn-signup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      border-radius: 2px;
    }
    .btn-signup:hover  { background: #b3860c; }
    .btn-signup:active { transform: scale(0.98); }
    .btn-signup.loading { opacity: 0.7; pointer-events: none; }

    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner-sm { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0;
      font-size: 0.75rem;
      color: var(--mid);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--light);
    }

    .login-link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--mid);
    }
    .login-link a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid var(--mid);
      transition: border-color 0.2s;
    }
    .login-link a:hover { border-color: var(--text); }

    .terms {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--mid);
      text-align: center;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--light);
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/index.html">T<span>A</span>MSIC</a>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/login.html">Login</a>
  </nav>
</header>

<main>
  <div class="card">
    <h1 class="card-title">Join TAMSIC</h1>
    <p class="card-sub">無料会員登録で先行試聴・コイン購入機能が使えます</p>

    <ul class="benefits">
      <li>一般公開より2週間早い先行試聴</li>
      <li>アーティスト限定コンテンツへのアクセス</li>
      <li>コインでお気に入り楽曲をアンロック</li>
      <li>新曲リリース通知（予定）</li>
    </ul>

    <button class="btn-signup" id="signupBtn" onclick="handleSignup()">
      <div class="spinner-sm"></div>
      <span>Create Account</span>
    </button>

    <div class="divider">すでに会員の方</div>

    <p class="login-link">
      <a href="/login.html">ログインはこちら</a>
    </p>

    <p class="terms">
      登録することで、TAMSICの利用規約およびプライバシーポリシーに同意したものとみなします。
    </p>
  </div>
</main>

<footer>© 2026 TAMSIC — All rights reserved</footer>

<script src="auth.js"></script>
<script>
  // すでにログイン済みならマイページへ
  if (isLoggedIn()) {
    window.location.href = '/mypage.html';
  }

  async function handleSignup() {
    const btn = document.getElementById('signupBtn');
    btn.classList.add('loading');
    await cognitoSignup(); // Cognito Hosted UI のサインアップへリダイレクト
  }
</script>

</body>
</html>
