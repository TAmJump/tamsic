<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
<script src="purchase-config.js"></script>
<script src="auth.js"></script>
<title>Reset password | TAMSIC</title></head><body>
<nav><a class="nav-logo" href="index.html">TAMSIC</a><ul class="nav-links"><li><a href="login.html">Login</a></li><li><a class="active" href="reset-password.html">Reset password</a></li></ul></nav>
<main class="page-shell"><div class="page-head"><div><div class="page-kicker">New password</div><h1 class="page-title">Reset password</h1></div><p class="page-copy">発行済みトークンを使って新しいパスワードに更新します。</p></div>
<div class="auth-grid"><section class="feature-card"><div class="notice-box">無効なトークンでは再設定できません。忘れた場合は <a class="muted-link" href="forgot-password.html">forgot password</a> から再発行してください。</div></section><section class="form-card"><div id="reset-message" class="message"></div><form id="reset-form"><div class="form-group"><label class="form-label" for="reset-password">New password</label><input id="reset-password" class="form-input" type="password" required minlength="8" placeholder="8文字以上"></div><div class="form-group"><label class="form-label" for="reset-confirm">Confirm password</label><input id="reset-confirm" class="form-input" type="password" required minlength="8" placeholder="もう一度入力"></div><div class="form-actions"><button class="btn-primary" type="submit">Save password</button><a class="btn-link" href="login.html">Back to login</a></div></form></section></div></main>
<footer><div>© TAMSIC</div><div>Reset password</div></footer>
<script>
document.getElementById('reset-form').addEventListener('submit', function(e){
 e.preventDefault();
 const msg=document.getElementById('reset-message');
 const token=new URLSearchParams(location.search).get('token');
 const pw=document.getElementById('reset-password').value;
 const cf=document.getElementById('reset-confirm').value;
 if(!token){ msg.className='message error show'; msg.textContent='トークンが見つかりません。'; return; }
 if(pw!==cf){ msg.className='message error show'; msg.textContent='確認用パスワードが一致していません。'; return; }
 const result=TAMSICAuth.resetPasswordWithToken(token, pw);
 if(!result.ok){ msg.className='message error show'; msg.textContent=result.message; return; }
 msg.className='message success show'; msg.textContent='パスワードを更新しました。ログイン画面へ移動します。';
 setTimeout(()=>location.href='login.html', 700);
});
</script></body></html>
