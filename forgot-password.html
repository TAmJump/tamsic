<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMSIC — RESET PASSWORD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
  <style>
    :root {
      --bg:#FAFAF7;--text:#0E0E0E;--accent:#C4960E;--light:#E6E6E0;--mid:#7A7A72;
      --err:#B8463A;--err-bg:#FDF3F1;--ok:#3F7F5B;--ok-bg:#F1F8F3;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--light)}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;letter-spacing:.3em;text-decoration:none;color:var(--text)}
    .logo span{color:var(--accent)}
    nav a{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--mid);margin-left:1.8rem;transition:color .2s}
    nav a:hover{color:var(--text)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}
    .card{width:100%;max-width:420px}
    .card-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;letter-spacing:.05em;margin-bottom:.5rem}
    .card-sub{font-size:.82rem;color:var(--mid);letter-spacing:.06em;margin-bottom:1.8rem;line-height:1.7}
    .step-nav{font-size:.72rem;color:var(--mid);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.6rem}
    .form-group{margin-bottom:1.2rem}
    .form-label{display:block;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mid);margin-bottom:.5rem}
    .form-input{width:100%;padding:.9rem 1rem;background:#fff;border:1px solid var(--light);color:var(--text);font-family:'Jost',sans-serif;font-size:.95rem;letter-spacing:.02em;border-radius:2px;transition:border-color .15s}
    .form-input:focus{outline:none;border-color:var(--accent)}
    .form-input::placeholder{color:#BFBFB8}
    .code-input{letter-spacing:.4em;text-align:center;font-size:1.2rem}
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:6px 8px}
    .pw-toggle:hover{color:var(--accent)}
    .pw-hint{font-size:.72rem;color:var(--mid);margin-top:.45rem;line-height:1.6}
    .btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1rem;background:var(--text);color:#fff;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,transform .1s;border-radius:2px}
    .btn:hover:not(:disabled){background:#222}
    .btn:active:not(:disabled){transform:scale(.98)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.loading{opacity:.7;pointer-events:none}
    .spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
    .loading .spinner-sm{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg-box{margin-top:1rem;padding:.9rem 1rem;font-size:.82rem;line-height:1.6;display:none}
    .msg-box.show{display:block}
    .msg-err{background:var(--err-bg);border-left:2px solid var(--err);color:var(--err)}
    .msg-ok{background:var(--ok-bg);border-left:2px solid var(--ok);color:var(--ok)}
    .back-link{display:inline-block;margin-top:1.2rem;font-size:.78rem;color:var(--mid);text-decoration:none;border-bottom:1px solid transparent;transition:color .2s,border-color .2s}
    .back-link:hover{color:var(--accent);border-bottom-color:var(--accent)}
    .divider{display:flex;align-items:center;gap:1rem;margin:1.8rem 0;color:var(--mid);font-size:.75rem;letter-spacing:.1em}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--light)}
    .login-link{text-align:center;font-size:.82rem;color:var(--mid)}
    .login-link a{color:var(--accent);text-decoration:none;font-weight:500;border-bottom:1px solid transparent;transition:border-color .2s}
    .login-link a:hover{border-color:var(--accent)}
    footer{text-align:center;padding:1.5rem;font-size:.72rem;color:var(--mid);letter-spacing:.08em;border-top:1px solid var(--light)}
    .step{display:none}
    .step.active{display:block}
  </style>
</head>
<body>
<header>
  <a class="logo" href="/index.html">T<span>A</span>MSIC</a>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/login.html">Login</a>
    <a href="/signup.html">Sign Up</a>
    <a href="#" data-lang-toggle style="font-size:11px;letter-spacing:.1em;color:var(--mid);border:1px solid var(--light);padding:5px 12px;border-radius:2px;text-decoration:none;transition:color .2s,border-color .2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='';this.style.color=''">EN</a>
  </nav>
</header>
<main>
  <div class="card">
    <div class="step active" id="step-email">
      <div class="step-nav" data-ja="STEP 1 / 2　メール確認" data-en="STEP 1 / 2　Email verification">STEP 1 / 2　メール確認</div>
      <h1 class="card-title" data-ja="パスワードを再設定" data-en="Reset password">パスワードを再設定</h1>
      <p class="card-sub" data-ja="登録済みのメールアドレスを入力してください。確認コードをお送りします。" data-en="Enter your registered email. We'll send you a verification code.">登録済みのメールアドレスを入力してください。確認コードをお送りします。</p>
      <form id="emailForm" novalidate>
        <div class="form-group">
          <label for="fp-email" class="form-label" data-ja="メールアドレス" data-en="Email">メールアドレス</label>
          <input type="email" id="fp-email" class="form-input" autocomplete="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn" id="emailBtn">
          <div class="spinner-sm"></div>
          <span data-ja="確認コードを送信" data-en="Send verification code">確認コードを送信</span>
        </button>
        <div class="msg-box msg-err" id="emailErr"></div>
      </form>
      <div class="divider"><span data-ja="ログインへ" data-en="Back to login">ログインへ</span></div>
      <p class="login-link"><a href="/login.html" data-ja="ログイン画面に戻る" data-en="Return to login">ログイン画面に戻る</a></p>
    </div>

    <div class="step" id="step-reset">
      <div class="step-nav" data-ja="STEP 2 / 2　新しいパスワード" data-en="STEP 2 / 2　New password">STEP 2 / 2　新しいパスワード</div>
      <h1 class="card-title" data-ja="新しいパスワードを設定" data-en="Set new password">新しいパスワードを設定</h1>
      <p class="card-sub">
        <span data-ja="メールで届いた 6 桁の確認コードと、新しいパスワードを入力してください。" data-en="Enter the 6-digit code from your email and your new password.">メールで届いた 6 桁の確認コードと、新しいパスワードを入力してください。</span>
        <br><strong style="color:var(--text);letter-spacing:.02em" id="reset-email-label"></strong>
      </p>
      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="rs-code" class="form-label" data-ja="確認コード" data-en="Verification code">確認コード</label>
          <input type="text" id="rs-code" class="form-input code-input" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required placeholder="000000">
        </div>
        <div class="form-group">
          <label for="rs-password" class="form-label" data-ja="新しいパスワード" data-en="New password">新しいパスワード</label>
          <div class="pw-wrap">
            <input type="password" id="rs-password" class="form-input" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('rs-password',this)" data-ja="表示" data-en="Show">表示</button>
          </div>
          <p class="pw-hint" data-ja="8文字以上・大文字・小文字・数字・記号（!@#$%^&amp;* など）をすべて含めてください" data-en="At least 8 chars with upper, lower, number, and symbol (e.g. !@#$%^&amp;*)">8文字以上・大文字・小文字・数字・記号（!@#$%^&amp;* など）をすべて含めてください</p>
        </div>
        <button type="submit" class="btn" id="resetBtn">
          <div class="spinner-sm"></div>
          <span data-ja="パスワードを更新" data-en="Update password">パスワードを更新</span>
        </button>
        <div class="msg-box msg-err" id="resetErr"></div>
        <div class="msg-box msg-ok" id="resetOk"></div>
      </form>
      <a href="#" class="back-link" onclick="backToStep1(event)" data-ja="← メールアドレスを変更する" data-en="← Change email">← メールアドレスを変更する</a>
    </div>
  </div>
</main>
<footer>© 2026 TAMSIC — All rights reserved</footer>

<script src="auth.js"></script>
<script src="lang.js"></script>
<script>
function lang(){ return (window.TAMSICLang && window.TAMSICLang.get && window.TAMSICLang.get()) || 'ja'; }
const ERR_MAP = {
  UserNotFoundException:    { ja:'このメールアドレスは登録されていません。',                 en:'Email not registered.' },
  LimitExceededException:   { ja:'試行回数が多すぎます。時間を置いてお試しください。',         en:'Too many attempts. Please try later.' },
  CodeMismatchException:    { ja:'確認コードが正しくありません。',                              en:'Invalid verification code.' },
  ExpiredCodeException:     { ja:'コードの有効期限が切れました。再送してください。',           en:'Code expired. Please resend.' },
  InvalidPasswordException: { ja:'パスワードは8文字以上で、大文字・小文字・数字・記号（!@#$%^&* など）をすべて含めてください。', en:'Password must be 8+ chars with upper, lower, number, and symbol (e.g. !@#$%^&*).' },
  InvalidParameterException:{ ja:'入力内容をご確認ください。',                                 en:'Please check your input.' },
  NotAuthorizedException:   { ja:'操作が許可されていません。',                                 en:'Operation not permitted.' }
};
function mapErr(err){
  const c = (err && (err.code||err.name)) || '';
  const m = ERR_MAP[c];
  if(m) return m[lang()] || m.ja;
  return lang()==='en' ? (err && err.message) || 'Something went wrong.' : (err && err.message) || 'エラーが発生しました。';
}
function togglePw(id, btn){
  const el=document.getElementById(id);
  if(el.type==='password'){ el.type='text'; btn.textContent=lang()==='en'?'Hide':'非表示'; }
  else{ el.type='password'; btn.textContent=lang()==='en'?'Show':'表示'; }
}
function showStep(name){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(`step-${name}`).classList.add('active');
}
function backToStep1(e){ e.preventDefault(); showStep('email'); }

const POOL_CONFIG = { UserPoolId:'ap-northeast-1_vozRgCY5k', ClientId:'62e35ra0h4s2dr657euorlm5bu' };
function pool(){ return new AmazonCognitoIdentity.CognitoUserPool(POOL_CONFIG); }
function user(email){ return new AmazonCognitoIdentity.CognitoUser({Username:email,Pool:pool()}); }

function cognitoForgot(email){
  return new Promise((resolve,reject)=>{
    user(email).forgotPassword({
      onSuccess: ()=>resolve(),
      inputVerificationCode: ()=>resolve(),
      onFailure: (err)=>reject(err)
    });
  });
}
function cognitoConfirmReset(email, code, newPassword){
  return new Promise((resolve,reject)=>{
    user(email).confirmPassword(code, newPassword, {
      onSuccess: ()=>resolve(),
      onFailure: (err)=>reject(err)
    });
  });
}

let pendingEmail='';

document.getElementById('emailForm').addEventListener('submit', async (ev)=>{
  ev.preventDefault();
  const errBox=document.getElementById('emailErr'); errBox.classList.remove('show'); errBox.textContent='';
  const btn=document.getElementById('emailBtn');
  const email=document.getElementById('fp-email').value.trim();
  if(!email){ errBox.textContent=lang()==='en'?'Please enter your email.':'メールアドレスを入力してください。'; errBox.classList.add('show'); return; }
  btn.classList.add('loading'); btn.disabled=true;
  try{
    await cognitoForgot(email);
    pendingEmail=email;
    document.getElementById('reset-email-label').textContent=email;
    showStep('reset');
  }catch(err){
    console.error('[forgot]',err);
    errBox.textContent=mapErr(err);
    errBox.classList.add('show');
  }finally{
    btn.classList.remove('loading'); btn.disabled=false;
  }
});

document.getElementById('resetForm').addEventListener('submit', async (ev)=>{
  ev.preventDefault();
  const errBox=document.getElementById('resetErr'); errBox.classList.remove('show'); errBox.textContent='';
  const okBox=document.getElementById('resetOk'); okBox.classList.remove('show'); okBox.textContent='';
  const btn=document.getElementById('resetBtn');
  const code=document.getElementById('rs-code').value.trim();
  const pw=document.getElementById('rs-password').value;
  if(!code || !pw){ errBox.textContent=lang()==='en'?'Please enter code and new password.':'コードと新しいパスワードを入力してください。'; errBox.classList.add('show'); return; }
  btn.classList.add('loading'); btn.disabled=true;
  try{
    await cognitoConfirmReset(pendingEmail, code, pw);
    okBox.textContent=lang()==='en'?'Password updated. Redirecting to login...':'パスワードを更新しました。ログイン画面に移動します…';
    okBox.classList.add('show');
    setTimeout(()=>{ location.href='/login.html'; }, 1500);
  }catch(err){
    console.error('[reset]',err);
    errBox.textContent=mapErr(err);
    errBox.classList.add('show');
  }finally{
    btn.classList.remove('loading'); btn.disabled=false;
  }
});
</script>

</body>
</html>
