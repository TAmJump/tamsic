<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
<script src="purchase-config.js"></script>
<script src="auth.js"></script>
<title>Forgot password | TAMSIC</title></head><body>
<nav><a class="nav-logo" href="index.html">TAMSIC</a><ul class="nav-links"><li><a href="login.html">Login</a></li><li><a href="signup.html">Sign up</a></li><li><a class="active" href="forgot-password.html">Reset</a></li></ul></nav>
<main class="page-shell"><div class="page-head"><div><div class="page-kicker">Reset access</div><h1 class="page-title">Forgot password</h1></div><p class="page-copy">この完成版では、再設定メール送信の代わりにブラウザ内で再設定リンクを発行します。あとでAPI接続に置き換えできる構造です。</p></div>
<div class="auth-grid"><section class="feature-card"><div class="notice-box">この画面は「メール送信前提の導線」を先に整えるための完成版UIです。後でメール送信APIを接続すれば、そのまま本番化できます。</div></section><section class="form-card"><div id="forgot-message" class="message"></div><form id="forgot-form"><div class="form-group"><label class="form-label" for="forgot-email">Email</label><input id="forgot-email" class="form-input" type="email" autocomplete="email" required placeholder="you@example.com"></div><div class="form-actions"><button class="btn-primary" type="submit">Create reset link</button><a class="btn-link" href="login.html">Back to login</a></div></form><div id="reset-link-wrap" class="section-block" style="display:none;"><div class="section-title">Reset link</div><div class="notice-box"><a id="reset-link" class="muted-link" href="#"></a></div></div></section></div></main>
<footer><div>© TAMSIC</div><div>Password reset flow</div></footer>
<script>
document.getElementById('forgot-form').addEventListener('submit', function(e){
 e.preventDefault();
 const msg=document.getElementById('forgot-message');
 const result=TAMSICAuth.createResetFlow(document.getElementById('forgot-email').value);
 if(!result.ok){ msg.className='message error show'; msg.textContent=result.message; return; }
 msg.className='message success show'; msg.textContent='再設定リンクを発行しました。';
 const wrap=document.getElementById('reset-link-wrap'); const link=document.getElementById('reset-link');
 link.href=result.link; link.textContent=result.link; wrap.style.display='block';
});
</script></body></html>
