<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMSIC — MY PAGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #FAFAF7;
      --text:   #0E0E0E;
      --accent: #C4960E;
      --light:  #E6E6E0;
      --mid:    #7A7A72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--light);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--mid);
      margin-left: 1.8rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    main {
      flex: 1;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    /* ─── ページタイトル ─── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--light);
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    .page-header .user-email {
      font-size: 0.8rem;
      color: var(--mid);
    }

    /* ─── コインカード ─── */
    .coin-card {
      background: var(--text);
      color: #fff;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .coin-info {}
    .coin-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 0.4rem;
    }
    .coin-balance {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1;
    }
    .coin-balance span {
      font-size: 1rem;
      color: var(--accent);
      margin-left: 0.4rem;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 0.1em;
    }
    .coin-icon {
      font-size: 3rem;
      opacity: 0.2;
    }

    /* ─── コイン購入 ─── */
    .section-title {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 1rem;
    }
    .coin-plans {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 500px) {
      .coin-plans { grid-template-columns: 1fr; }
    }
    .plan-card {
      border: 1px solid var(--light);
      border-radius: 6px;
      padding: 1.2rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
    }
    .plan-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(196,150,14,0.1);
    }
    .plan-card.popular {
      border-color: var(--accent);
      position: relative;
    }
    .plan-badge {
      position: absolute;
      top: -0.6rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.6rem;
      border-radius: 99px;
      white-space: nowrap;
    }
    .plan-coins {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--accent);
    }
    .plan-coin-label {
      font-size: 0.7rem;
      color: var(--mid);
      letter-spacing: 0.08em;
    }
    .plan-price {
      font-size: 1rem;
      font-weight: 500;
      margin-top: 0.6rem;
    }

    /* ─── 先行試聴リンク ─── */
    .artist-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 500px) {
      .artist-links { grid-template-columns: 1fr; }
    }
    .artist-link {
      display: block;
      padding: 1.2rem 1.5rem;
      border: 1px solid var(--light);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .artist-link:hover { border-color: var(--text); }
    .artist-link .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }
    .artist-link .desc {
      font-size: 0.75rem;
      color: var(--mid);
      letter-spacing: 0.06em;
    }
    .artist-link.nono .name { color: #0099CC; }
    .artist-link.kiki .name { color: #C85A72; }

    /* ─── ログアウト ─── */
    .logout-section {
      padding-top: 1.5rem;
      border-top: 1px solid var(--light);
    }
    .btn-logout {
      background: transparent;
      color: var(--mid);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--light);
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: #c00; color: #c00; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--light);
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/index.html">T<span>A</span>MSIC</a>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/nono.html">no-no</a>
    <a href="/kiki.html">kiki</a>
  </nav>
</header>

<main>
  <!-- ページヘッダー -->
  <div class="page-header">
    <div>
      <h1>My Page</h1>
      <p class="user-email" id="userEmail">読み込み中...</p>
    </div>
  </div>

  <!-- コイン残高 -->
  <div class="coin-card">
    <div class="coin-info">
      <div class="coin-label">Coin Balance</div>
      <div class="coin-balance">
        <span id="coinBalance">0</span><span>coins</span>
      </div>
    </div>
    <div class="coin-icon">🪙</div>
  </div>

  <!-- コイン購入 -->
  <p class="section-title">コインを購入する</p>
  <div class="coin-plans">
    <a class="plan-card" href="https://square.link/u/ooAT7lXM" target="_blank" rel="noopener">
      <div class="plan-coins">100</div>
      <div class="plan-coin-label">Starter</div>
      <div class="plan-price">¥200</div>
    </a>
    <a class="plan-card popular" href="https://square.link/u/ze3xiMxQ" target="_blank" rel="noopener">
      <div class="plan-badge">人気</div>
      <div class="plan-coins">300</div>
      <div class="plan-coin-label">Standard</div>
      <div class="plan-price">¥500</div>
    </a>
    <a class="plan-card" href="https://square.link/u/4Qs8fs2U" target="_blank" rel="noopener">
      <div class="plan-coins">500</div>
      <div class="plan-coin-label">Premium</div>
      <div class="plan-price">¥800</div>
    </a>
  </div>

  <!-- アーティストページ -->
  <p class="section-title">先行試聴を楽しむ</p>
  <div class="artist-links">
    <a class="artist-link nono" href="/nono.html">
      <div class="name">no-no</div>
      <div class="desc">先行試聴 → アンロック</div>
    </a>
    <a class="artist-link kiki" href="/kiki.html">
      <div class="name">kiki</div>
      <div class="desc">先行試聴 → アンロック</div>
    </a>
  </div>

  <!-- ログアウト -->
  <div class="logout-section">
    <button class="btn-logout" onclick="handleLogout()">Logout</button>
  </div>
</main>

<footer>© 2026 TAMSIC — All rights reserved</footer>

<script src="auth.js"></script>
<script>
  // 未ログインならログインページへ
  if (!isLoggedIn()) {
    window.location.href = '/login.html';
  }

  // ユーザー情報表示
  const userInfo = getUserInfo();
  if (userInfo) {
    document.getElementById('userEmail').textContent =
      userInfo.email || userInfo.sub || 'ゲスト';
  }

  // コイン残高表示
  document.getElementById('coinBalance').textContent = getCoins();

  // ログアウト処理
  function handleLogout() {
    if (confirm('ログアウトしますか？')) {
      cognitoLogout();
    }
  }
</script>

</body>
</html>
