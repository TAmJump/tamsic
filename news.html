<style>
:root{--bg:#FAFAF7;--text:#0E0E0E;--accent:#C4960E;--light:#E6E6E0;--mid:#7A7A72;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:22px 64px;background:rgba(250,250,247,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--light);}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:.35em;color:var(--text);text-decoration:none;}
.nav-links{display:flex;gap:44px;list-style:none;}
.nav-links a{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color .25s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);}

.page-header{padding:160px 64px 80px;border-bottom:1px solid var(--light);}
.ph-label{font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
.ph-title{font-family:'Playfair Display',serif;font-size:clamp(52px,8vw,100px);font-weight:900;line-height:.9;letter-spacing:-.02em;}

.news-section{padding:80px 64px;}
.news-filter{display:flex;gap:12px;margin-bottom:48px;flex-wrap:wrap;}
.filter-btn{font-size:10px;letter-spacing:.25em;text-transform:uppercase;padding:9px 20px;border:1px solid var(--light);background:var(--white);color:var(--mid);cursor:pointer;transition:all .22s;font-family:'Jost',sans-serif;}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);}

.news-list{display:flex;flex-direction:column;}
.news-item{display:grid;grid-template-columns:140px 1fr auto;gap:32px;align-items:baseline;padding:32px 0;border-bottom:1px solid var(--light);}
.ni-date{font-size:12px;color:var(--mid);letter-spacing:.1em;}
.ni-body{}
.ni-title{font-size:17px;font-weight:400;line-height:1.6;margin-bottom:4px;}
.ni-sub{font-size:12px;color:var(--mid);letter-spacing:.1em;}
.ni-tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(196,150,14,.4);padding:5px 14px;white-space:nowrap;}

.no-news{padding:80px;text-align:center;color:var(--mid);}
.no-news p{font-size:14px;}

footer{padding:48px 64px;background:#2C2A26;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-top:80px;}
.footer-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:.35em;color:#fff;}
.footer-copy{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.1em;}

@media(max-width:768px){
nav{padding:18px 24px;}.nav-links{display:none;}
.page-header,.news-section{padding:80px 24px 40px;}
.news-item{grid-template-columns:1fr;gap:8px;}
footer{padding:32px 24px;flex-direction:column;gap:16px;text-align:center;}
}
.footer-legal{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}.footer-legal a{font-size:11px;letter-spacing:.15em;color:rgba(255,255,255,.4);text-decoration:none;text-transform:uppercase;transition:color .2s;}.footer-legal a:hover{color:var(--accent);}
.nav-logo { display:flex; align-items:center; }


</style>
</head>

function renderNews(filter) {
  const list = document.getElementById('news-list');
  const items = filter==='all' ? allNews : allNews.filter(n=>n.tag===filter);
  if (!items.length) {
    list.innerHTML = '<div class="no-news"><p>まだニュースはありません。</p></div>';
    return;
  }
  const _lang = window.TAMSICLang ? window.TAMSICLang.get() : 'ja';
  list.innerHTML = items.map(n=>`
    <div class="news-item" data-tag="${n.tag}">
      <span class="ni-date">${n.date||'—'}</span>
      <div class="ni-body">
        <p class="ni-title">${(window.TAMSICLang&&window.TAMSICLang.get()==='en'&&n.titleEn)?n.titleEn:n.title}</p>
      </div>
      <span class="ni-tag">${n.tag||'Info'}</span>
    </div>`).join('');
}

function filterNews(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNews(tag);
}

loadNews();
document.addEventListener('tamsic:langchange', function(){
  const active = document.querySelector('.filter-btn.active');
  const m = active && active.getAttribute('onclick') ? active.getAttribute('onclick').match(/'([^']+)'/) : null;
  renderNews(m ? m[1] : 'all');
});
</script>
</body>
