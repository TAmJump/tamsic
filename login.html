<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMSIC — LOGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #FAFAF7;
      --text:   #0E0E0E;
      --accent: #C4960E;
      --light:  #E6E6E0;
      --mid:    #7A7A72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--light);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--mid);
      margin-left: 1.8rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 400px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .card-sub {
      font-size: 0.82rem;
      color: var(--mid);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
    }

    /* ─── BUTTON ─── */
    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem;
      background: var(--text);
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      border-radius: 2px;
    }
    .btn-login:hover  { background: #222; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login.loading { opacity: 0.7; pointer-events: none; }

    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner-sm { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0;
      color: var(--light);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--mid);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--light);
    }

    .signup-link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--mid);
    }
    .signup-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .signup-link a:hover { border-color: var(--accent); }

    .notice {
      margin-top: 2.5rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--light);
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--mid);
      line-height: 1.6;
    }
    .notice strong { color: var(--accent); }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--light);
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/index.html">T<span>A</span>MSIC</a>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/signup.html">Sign Up</a>
    <a href="#" data-lang-toggle style="font-size:11px;letter-spacing:.1em;color:var(--mid);border:1px solid var(--light);padding:5px 12px;border-radius:2px;text-decoration:none;transition:color .2s,border-color .2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='';this.style.color=''">EN</a>
  </nav>
</header>

<main>
  <div class="card">
    <h1 class="card-title" data-ja="会員ログイン" data-en="Member Login">会員ログイン</h1>
    <p class="card-sub"><span data-ja="先行試聴・コイン機能を利用するにはログインが必要です" data-en="Login required for early listening &amp; coins">先行試聴・コイン機能を利用するにはログインが必要です</span></p>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <div class="spinner-sm"></div>
      <span data-ja="ログイン" data-en="Login">ログイン</span>
    </button>

    <div class="divider">or</div>

    <p class="signup-link">
      <span data-ja="アカウントをお持ちでない方は" data-en="New here?">アカウントをお持ちでない方は</span> <a href="/signup.html" data-ja="新規登録" data-en="Create account">新規登録</a>
    </p>

    <div class="notice">
      <strong data-ja="会員特典：" data-en="Member benefits:">会員特典：</strong><span data-ja="一般公開より2週間早く新曲を試聴できます。コインを購入して楽曲をアンロックしましょう。" data-en="Listen early &amp; unlock full tracks with coins.">一般公開より2週間早く新曲を試聴できます。コインを購入して楽曲をアンロックしましょう。</span>
    </div>
  </div>
</main>

<footer><span data-ja="© 2026 TAMSIC — All rights reserved" data-en="© 2026 TAMSIC — All rights reserved">© 2026 TAMSIC — All rights reserved</span></footer>

<script src="auth.js"></script>
<script src="lang.js"></script>
<script>
  // すでにログイン済みならマイページへ
  if (isLoggedIn()) {
    window.location.href = '/mypage.html';
  }

  async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    await cognitoLogin(); // Cognito Hosted UI へリダイレクト
  }
</script>

</body>
</html>
